<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Neon Survivors Mobile</title>
    <!-- Google Fonts 구글 폰트 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-B-J6t4vp.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-LesJeh1P.css">
  </head>
  <body>
    <div id="app">
      <!-- 게임 화면 (HTML5 Canvas) -->
      <canvas id="game-canvas"></canvas>

      <!-- 상단 HUD 영역 -->
      <div id="hud-container" class="ui-overlay">
        <div class="xp-bar-wrapper">
          <div id="xp-bar-fill"></div>
        </div>
        <div class="hud-stats">
          <div class="hud-item"><span class="label">LV</span> <span id="hud-level" class="value">1</span></div>
          <div class="hud-item time"><span id="hud-time" class="value">00:00</span></div>
          <div class="hud-item"><span class="label">KILLS</span> <span id="hud-kills" class="value">0</span></div>
        </div>
      </div>

      <!-- 메인 화면 (Start Screen) -->
      <div id="start-screen" class="ui-screen active">
        <h1 class="game-title">NEON<br><span class="highlight">SURVIVORS</span></h1>
        <p class="game-subtitle">모바일 세로형 네온 뱀서</p>
        <button id="start-btn" class="btn btn-primary">게임 시작</button>
      </div>

      <!-- 레벨업 선택 오버레이 (Pause & Selection Card) -->
      <div id="levelup-screen" class="ui-screen">
        <div class="levelup-dialog">
          <h2 class="screen-title">LEVEL UP!</h2>
          <p class="screen-subtitle">성장할 무기나 능력을 선택하세요</p>
          <div id="card-container" class="card-list">
            <!-- 동적으로 생성될 3장의 카드들 -->
          </div>
        </div>
      </div>

      <!-- 게임오버 / 승리 화면 -->
      <div id="gameover-screen" class="ui-screen">
        <div class="result-dialog">
          <h2 id="result-title" class="screen-title">GAME OVER</h2>
          <div class="result-stats">
            <div class="result-stat-item">생존 시간: <span id="result-time" class="value">00:00</span></div>
            <div class="result-stat-item">처치 수: <span id="result-kills" class="value">0</span></div>
            <div class="result-stat-item">최종 레벨: <span id="result-level" class="value">1</span></div>
          </div>
          <button id="restart-btn" class="btn btn-primary">다시 도전</button>
        </div>
      </div>
    </div>
  </body>
</html>
